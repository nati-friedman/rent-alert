<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="../styles/side-panel.css">
  </head>
  <body>
    <h3>Settings</h3>
    <input type="text" id="keywordInput" placeholder="Add keyword...">
    <button id="addBtn">Add</button>

    <h4>Active Keywords:</h4>
    <div id="keywordList"></div>

    <div class="actions">

      <button id="clearBtn">Clear History</button>
    </div>

    <script src="scripts/sidepanel.js"></script>
  </body>
</html>
